<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #4472C4; }
        button { background: #4472C4; color: white; border: none; padding: 20px 45px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2f5597; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Organograma - Atenção Especializada</h1>
        <p>Clique abaixo para baixar o arquivo PowerPoint editável e completo.</p>
        <button onclick="gerarPPTX()">BAIXAR POWERPOINT (.PPTX)</button>
    </div>

    <script>
        function gerarPPTX() {
            let pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_WIDE';
            let slide = pptx.addSlide();

            const AZUL = "4472C4";
            const BRANCO = "FFFFFF";

            // Título Superior
            slide.addText("SUBSECRETARIA DE ATENÇÃO ESPECIALIZADA", { x: 0, y: 0.2, w: "100%", align: "center", bold: true, fontSize: 22 });

            // Nível 1: Subsecretário
            slide.addShape(pptx.ShapeType.rect, { x: 5.0, y: 0.8, w: 3.3, h: 0.8, fill: { color: AZUL }, line: { color: AZUL, width: 1 } });
            slide.addText("SUBSECRETÁRIO DE ATENÇÃO\nESPECIALIZADA", { x: 5.0, y: 0.8, w: 3.3, h: 0.8, align: "center", bold: true, color: BRANCO, fontSize: 11 });

            // Nível 2: Coordenadoria
            slide.addShape(pptx.ShapeType.rect, { x: 1.5, y: 1.8, w: 2.8, h: 1.0, fill: { color: AZUL }, line: { color: AZUL, width: 1 } });
            slide.addText("COORDENADORIA DE ASSISTÊNCIA\nHOSPITALAR E PRONTO ATENDIMENTO", { x: 1.5, y: 1.8, w: 2.8, h: 1.0, align: "center", bold: true, color: BRANCO, fontSize: 10 });

            // --- LINHAS DE CONEXÃO ---
            slide.addShape(pptx.ShapeType.line, { x: 6.6, y: 1.6, w: 0, h: 0.6, line: { color: AZUL, width: 1.5 } }); // Vertical do topo
            slide.addShape(pptx.ShapeType.line, { x: 2.9, y: 2.2, w: 9.0, h: 0, line: { color: AZUL, width: 1.5 } }); // Horizontal Principal
            slide.addShape(pptx.ShapeType.line, { x: 2.9, y: 1.6, w: 0, h: 0.2, line: { color: AZUL, width: 1.5 } }); // Liga Coordenadoria

            // --- UNIDADES ESQUERDA (HMNM, PSMRO, UPA) ---
            const unidades = [
                { x: 0.2, name: "HMNM" },
                { x: 1.7, name: "PSMRO" },
                { x: 3.2, name: "UPA" }
            ];

            unidades.forEach(u => {
                slide.addShape(pptx.ShapeType.rect, { x: u.x, y: 3.5, w: 1.2, h: 0.5, line: { color: AZUL, width: 1.5 } });
                slide.addText(u.name, { x: u.x, y: 3.5, w: 1.2, h: 0.5, align: "center", bold: true, fontSize: 14 });
                
                // Exemplo de sub-caixas (Direção Técnica/Adm)
                slide.addShape(pptx.ShapeType.rect, { x: u.x, y: 4.1, w: 0.55, h: 0.4, line: { color: AZUL, width: 1 } });
                slide.addText("DIREÇÃO\nTÉCNICA", { x: u.x, y: 4.1, w: 0.55, h: 0.4, align: "center", fontSize: 7 });
                
                slide.addShape(pptx.ShapeType.rect, { x: u.x + 0.65, y: 4.1, w: 0.55, h: 0.4, line: { color: AZUL, width: 1 } });
                slide.addText("DIREÇÃO\nADMINISTRATIVA", { x: u.x + 0.65, y: 4.1, w: 0.55, h: 0.4, align: "center", fontSize: 6 });
            });

            // --- DEPARTAMENTOS DIREITA ---
            const deptoDir = [
                { x: 4.7, name: "CERE" },
                { x: 5.6, name: "CERE RL" },
                { x: 6.5, name: "RESGATE" },
                { x: 7.8, name: "DEPARTAMENTO DE SAÚDE MENTAL,\nÁLCOOL E OUTRAS DROGAS *", w: 2.5 },
                { x: 10.5, name: "SAD" },
                { x: 11.6, name: "CENTRO DE\nESPECIALIDADES" }
            ];

            deptoDir.forEach(d => {
                let width = d.w || 1.0;
                slide.addShape(pptx.ShapeType.rect, { x: d.x, y: 3.5, w: width, h: 0.6, line: { color: AZUL, width: 1.5 } });
                slide.addText(d.name, { x: d.x, y: 3.5, w: width, h: 0.6, align: "center", bold: true, fontSize: 8 });
            });

            pptx.writeFile({ fileName: "Atencao_Especializada_SUVISA.pptx" });
        }
    </script>
</body>
</html>
